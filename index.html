<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro Sync</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

/* ---------------- AUTH SCREEN ---------------- */
#auth-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  text-align: center;
}

.title {
  font-size: 32px;
  font-weight: bold;
  margin-bottom: 8px;
}

.subtitle {
  color: #888;
  margin-bottom: 32px;
}

.btn-google {
  background: #fff;
  color: #000;
  border: none;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn-google:active { opacity: 0.8; }

/* ---------------- APP SCREEN ---------------- */
#app-screen {
  display: none; 
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.cm-number { color: #4cd964 !important; }
.cm-comment { color: #555 !important; } /* สีของเส้นประใน CodeMirror */

/* RIGHT */
.right {
  width: 50%;
  position: relative;
  overflow: hidden; 
}

.canvas {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  will-change: transform; 
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

/* ดีไซน์ของเส้นคั่น (Divider) ฝั่งขวา */
.divider-line {
  position: absolute;
  left: 0px;
  right: 16px;
  height: 1px;
  background-color: #333;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}

.user-info {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #888;
  font-size: 14px;
}

.btn-logout {
  background: transparent;
  color: #ff3b30;
  border: 1px solid #ff3b30;
  padding: 4px 12px;
  border-radius: 4px;
  cursor: pointer;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="auth-screen">
  <div class="title">Calc Pro</div>
  <div class="subtitle">Securely sync your calculations</div>
  <button id="login-btn" class="btn-google">
    <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Sign in with Google
  </button>
</div>

<div id="app-screen">
  <div class="container">
    <textarea id="editor"></textarea>
    <div class="right">
      <div id="canvas" class="canvas"></div>
    </div>
  </div>

  <div class="footer">
    <div class="user-info">
      <span id="user-email"></span>
      <button id="logout-btn" class="btn-logout">Logout</button>
    </div>
    <div style="text-align: right;">
      <div style="font-size: 12px; color: #888;">Total</div>
      <div id="total" style="font-size: 20px; font-weight: bold;">0</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

/* =========================================
   🔴🔴 ใส่ Firebase Config ของคุณตรงนี้ 🔴🔴
========================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCZLADs__pYeCSFChAEkA9dtuqWMZQ0K0c",
  authDomain: "calc-10427.firebaseapp.com",
  projectId: "calc-10427",
  storageBucket: "calc-10427.firebasestorage.app",
  messagingSenderId: "636760379592",
  appId: "1:636760379592:web:79e917e03b29586f5e55fd",
  measurementId: "G-656Y5L5ZCM"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let docRef = null;
let saveTimeout = null;

/* ---------- DOM ELEMENTS ---------- */
const authScreen = document.getElementById("auth-screen");
const appScreen = document.getElementById("app-screen");
const loginBtn = document.getElementById("login-btn");
const logoutBtn = document.getElementById("logout-btn");
const userEmailDisplay = document.getElementById("user-email");
const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* ---------- AUTH LOGIC ---------- */
loginBtn.addEventListener("click", () => {
  signInWithPopup(auth, provider).catch(error => alert("Login Failed: " + error.message));
});

logoutBtn.addEventListener("click", () => {
  signOut(auth).catch(error => alert("Logout Failed: " + error.message));
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    authScreen.style.display = "none";
    appScreen.style.display = "block";
    userEmailDisplay.textContent = user.email;
    
    docRef = doc(db, "users", user.uid);
    
    getDoc(docRef).then((docSnap) => {
      if (docSnap.exists() && docSnap.data().content !== undefined) {
        cm.setValue(docSnap.data().content);
      } else {
        cm.setValue(`DEPT: -247000\nNOTE: ข้อมูลพร้อมใช้งานแล้ว ;\n---\nCC: -14000\n`);
      }
      setTimeout(() => cm.refresh(), 100); 
    });

  } else {
    authScreen.style.display = "flex";
    appScreen.style.display = "none";
    docRef = null;
  }
});

/* ---------- INIT CODEMIRROR ---------- */
CodeMirror.defineMode("calc", function() {
  return {
    token: function(stream) {
      // ตรวจจับเส้นคั่น (---) ให้เป็นสีเทา
      if (stream.match(/^---+/)) {
        return "comment";
      }

      const colonIndex = stream.string.indexOf(':');
      if (colonIndex !== -1 && stream.pos <= colonIndex) {
        if (stream.match(/^[^:]+/)) return null;
        if (stream.match(/^:/)) return null;
      }
      if (stream.match(/^[0-9,]+(\.[0-9]+)?([kKmM]?)/)) {
        return "number"; 
      }
      stream.next();
      return null;
    }
  };
});

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "calc",
  lineWrapping: true,
  viewportMargin: Infinity 
});

/* ---------- SAVE LOGIC ---------- */
cm.on("change", () => {
  const val = cm.getValue();
  render();

  if (docRef) {
    clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => {
      setDoc(docRef, { content: val }, { merge: true })
        .catch(err => console.error("Save Error:", err));
    }, 1000); 
  }
});

/* ---------- SCROLL LOGIC ---------- */
cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  canvas.style.transform = `translateY(-${scroll.top}px)`;
});

/* ---------- ENGINE & PARSER ---------- */
function normalize(expr) {
  return expr
    .replace(/[—–]/g, "-") // 🔴 แก้ปัญหา iOS ชอบเปลี่ยน - เป็น — (ขีดเส้นยาว)
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .replace(/[^0-9+\-*/().\s]/g, " ");
}

function cleanExpression(expr) {
  return expr
    .replace(/\s+/g, " ")
    .trim()
    .replace(/[+\-*/]+$/, "")
    .replace(/^\s*[*\/]+/, "");
}

function safeEval(expr) {
  try {
    if (!expr) return { ok: false };
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return { ok: false };
    const val = Function('"use strict";return (' + expr + ')')();
    if (typeof val !== "number" || isNaN(val) || !isFinite(val)) return { ok: false };
    return { ok: true, value: val };
  } catch {
    return { ok: false };
  }
}

function parseBlocks(lines) {
  const blocks = [];
  let currentExpr = "";
  let startLine = null;

  function pushCurrent() {
    const trimmedExpr = currentExpr.trim();
    if (trimmedExpr !== "") {
      if (!trimmedExpr.endsWith(";")) {
        blocks.push(buildBlock(startLine !== null ? startLine : 0, currentExpr));
      }
    }
    currentExpr = "";
    startLine = null;
  }

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i] || "";
    let line = raw.split("//")[0].trim();
    
    // 🔴 ตรวจจับการพิมพ์ --- เพื่อขึ้นเส้นคั่นใหม่
    if (/^---+$/.test(line)) {
      pushCurrent();
      blocks.push({ type: "divider", line: i });
      continue;
    }

    if (line === "") { pushCurrent(); continue; }
    if (line.includes(":")) {
      pushCurrent();
      startLine = i;
      currentExpr = line.substring(line.indexOf(":") + 1).trim();
      continue;
    }

    let endsWithOp = /[+\-*/(]$/.test(currentExpr.trim());
    let startsWithOp = /^[+\-*/)]/.test(line);

    if (currentExpr === "") {
      startLine = i; currentExpr = line;
    } else if (endsWithOp || startsWithOp) {
      currentExpr += " " + line;
    } else {
      pushCurrent();
      startLine = i; currentExpr = line;
    }
  }
  pushCurrent();
  return blocks;
}

function buildBlock(line, expr) {
  const normalized = normalize(expr);
  const cleaned = cleanExpression(normalized);
  const result = safeEval(cleaned);
  return { type: "math", line, ok: result.ok, value: result.ok ? result.value : null };
}

/* ---------- RENDER ---------- */
function render() {
  canvas.innerHTML = "";
  const lines = [];
  for (let i = 0; i < cm.lineCount(); i++) lines.push(cm.getLine(i));
  
  const blocks = parseBlocks(lines);
  let total = 0;

  blocks.forEach(b => {
    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");
    const el = document.createElement("div");

    // 🔴 ถ้าระบบเจอว่าก้อนนี้คือเส้นคั่น (Divider) ให้วาดเส้นสีเทา
    if (b.type === "divider") {
      el.className = "divider-line";
      el.style.top = (coord.top + 12) + "px"; // +12 เพื่อให้อยู่กึ่งกลางบรรทัดพอดี
      canvas.appendChild(el);
      return;
    }

    // ถ้าไม่ใช่เส้นคั่น ก็คำนวณและวาดตัวเลขตามปกติ
    el.className = "result";
    el.style.top = coord.top + "px";

    if (b.ok) {
      const num = b.value;
      el.textContent = num.toLocaleString('en-US', { maximumFractionDigits: 2 });
      if (num > 0) el.classList.add("positive");
      if (num < 0) el.classList.add("negative");
      total += num;
    } else {
      el.textContent = "—";
      el.style.opacity = 0.3;
    }
    canvas.appendChild(el);
  });

  if (Math.abs(total) < 0.005) total = 0;
  totalDiv.textContent = total.toLocaleString('en-US', { maximumFractionDigits: 2 });

  const scrollInfo = cm.getScrollInfo();
  canvas.style.transform = `translateY(-${scrollInfo.top}px)`;
}
</script>

</body>
</html>
