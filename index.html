<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>
  <div class="right" id="results"></div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "text",
  lineWrapping: true
});

cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

UOB WORLD: 81 + 109 +
147 + 74 + 79 +
733.27 + 3500 + 50

UOB ONE: 45 + 22 + 47 +
45 - 63.50 + 145 + 272 -
16 + 47 + 16 + 33 + 50
`);

cm.on("change", () => {
  localStorage.setItem("calc-data", cm.getValue());
  calculate();
});

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  document.getElementById("results").scrollTop = scroll.top;
});

/* ---------- CALC ENGINE ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000);
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict";return (' + expr + ')')();
  } catch {
    return null;
  }
}

/* ---------- BLOCK PARSER ---------- */

function parseBlocks(lines) {
  let blocks = [];
  let current = { start: 0, expr: "" };

  lines.forEach((line, i) => {
    if (line.includes(":")) {
      if (current.expr.trim()) {
        blocks.push(current);
      }

      current = {
        start: i,
        expr: line.split(":").slice(1).join(":")
      };
    } else {
      current.expr += " " + line;
    }
  });

  if (current.expr.trim()) blocks.push(current);

  return blocks.map(b => {
    const val = safeEval(normalize(b.expr));
    return {
      line: b.start,
      value: val
    };
  });
}

/* ---------- RENDER ---------- */

function calculate() {
  const resultsDiv = document.getElementById("results");
  const totalDiv = document.getElementById("total");

  resultsDiv.innerHTML = "";

  const lineCount = cm.lineCount();
  const lines = [];

  for (let i = 0; i < lineCount; i++) {
    lines.push(cm.getLine(i) || "");
  }

  const blocks = parseBlocks(lines);

  let total = 0;

  blocks.forEach(block => {
    if (block.value === null || isNaN(block.value)) return;

    const num = Number(block.value);

    const coord = cm.charCoords({ line: block.line, ch: 0 }, "local");

    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";
    el.textContent = num.toLocaleString();

    if (num > 0) el.classList.add("positive");
    if (num < 0) el.classList.add("negative");

    resultsDiv.appendChild(el);

    total += num;
  });

  totalDiv.textContent = total.toLocaleString();
}

/* init */
calculate();
</script>

</body>
</html>
