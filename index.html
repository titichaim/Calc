<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro Sync</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.cm-number {
  color: #4cd964 !important;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
  overflow: hidden; 
}

.canvas {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  will-change: transform; 
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>

  <div class="right">
    <div id="canvas" class="canvas"></div>
  </div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

/* =========================================
   1. ใส่การตั้งค่า Firebase ของคุณตรงนี้
========================================= */
const firebaseConfig = {
  apiKey: "AIzaSyCZLADs__pYeCSFChAEkA9dtuqWMZQ0K0c",
  authDomain: "calc-10427.firebaseapp.com",
  projectId: "calc-10427",
  storageBucket: "calc-10427.firebasestorage.app",
  messagingSenderId: "636760379592",
  appId: "1:636760379592:web:79e917e03b29586f5e55fd",
  measurementId: "G-656Y5L5ZCM"
};
// เริ่มต้นใช้งาน Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
// ตั้งชื่อ Collection ว่า "calculator" และ Document ชื่อ "myData"
const docRef = doc(db, "calculator", "myData"); 

/* ---------- INIT CODEMIRROR ---------- */

CodeMirror.defineMode("calc", function() {
  return {
    token: function(stream) {
      const colonIndex = stream.string.indexOf(':');
      if (colonIndex !== -1 && stream.pos <= colonIndex) {
        if (stream.match(/^[^:]+/)) return null;
        if (stream.match(/^:/)) return null;
      }
      if (stream.match(/^[0-9,]+(\.[0-9]+)?([kKmM]?)/)) {
        return "number"; 
      }
      stream.next();
      return null;
    }
  };
});

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "calc",
  lineWrapping: true,
  viewportMargin: Infinity 
});

// โหลดข้อมูลเบื้องต้นจากเครื่องก่อน (เพื่อให้หน้าเว็บแสดงผลทันที ไม่ต้องรอเน็ต)
cm.setValue(localStorage.getItem("calc-data") || `กำลังเชื่อมต่อ Firebase...`);

const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* =========================================
   2. ดึงข้อมูลจาก Firebase มาแสดงทับ
========================================= */
getDoc(docRef).then((docSnap) => {
  if (docSnap.exists() && docSnap.data().content !== undefined) {
    const firebaseData = docSnap.data().content;
    cm.setValue(firebaseData); // อัปเดตหน้าจอเป็นข้อมูลจาก Firebase
    localStorage.setItem("calc-data", firebaseData); // อัปเดตเครื่องตัวเองให้ตรงกัน
  } else {
    cm.setValue(`DEPT: -247000\nNOTE: ลองลบและพิมพ์ข้อมูลของคุณได้เลยครับ`);
  }
}).catch(err => {
  console.error("โหลด Firebase ไม่สำเร็จ (อาจยังไม่ได้เปิดสิทธิ์ Rules):", err);
});

/* =========================================
   3. ระบบ Save ลง Firebase (พร้อม Debounce)
========================================= */
let saveTimeout = null;

cm.on("change", () => {
  const val = cm.getValue();
  localStorage.setItem("calc-data", val); // เซฟลงเครื่องทันที
  render();

  // หน่วงเวลาเซฟลง Firebase 1 วินาที (ถ้าพิมพ์ต่อเวลาจะถูกรีเซ็ตใหม่)
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(() => {
    setDoc(docRef, { content: val }, { merge: true })
      .then(() => console.log("ซิงค์ข้อมูลลง Firebase สำเร็จ!"))
      .catch(err => console.error("เซฟลง Firebase ไม่สำเร็จ:", err));
  }, 1000); 
});

/* ---------- SCROLL ---------- */

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  canvas.style.transform = `translateY(-${scroll.top}px)`;
});

/* ---------- ENGINE & PARSER ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .replace(/[^0-9+\-*/().\s]/g, " ");
}

function cleanExpression(expr) {
  return expr
    .replace(/\s+/g, " ")
    .trim()
    .replace(/[+\-*/]+$/, "")
    .replace(/^\s*[*\/]+/, "");
}

function safeEval(expr) {
  try {
    if (!expr) return { ok: false };
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return { ok: false };
    const val = Function('"use strict";return (' + expr + ')')();
    if (typeof val !== "number" || isNaN(val) || !isFinite(val)) return { ok: false };
    return { ok: true, value: val };
  } catch {
    return { ok: false };
  }
}

function parseBlocks(lines) {
  const blocks = [];
  let currentExpr = "";
  let startLine = null;

  function pushCurrent() {
    const trimmedExpr = currentExpr.trim();
    if (trimmedExpr !== "") {
      if (!trimmedExpr.endsWith(";")) {
        blocks.push(buildBlock(startLine !== null ? startLine : 0, currentExpr));
      }
    }
    currentExpr = "";
    startLine = null;
  }

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i] || "";
    let line = raw.split("//")[0].trim();
    
    if (line === "") { pushCurrent(); continue; }
    if (line.includes(":")) {
      pushCurrent();
      startLine = i;
      currentExpr = line.substring(line.indexOf(":") + 1).trim();
      continue;
    }

    let endsWithOp = /[+\-*/(]$/.test(currentExpr.trim());
    let startsWithOp = /^[+\-*/)]/.test(line);

    if (currentExpr === "") {
      startLine = i; currentExpr = line;
    } else if (endsWithOp || startsWithOp) {
      currentExpr += " " + line;
    } else {
      pushCurrent();
      startLine = i; currentExpr = line;
    }
  }
  pushCurrent();
  return blocks;
}

function buildBlock(line, expr) {
  const normalized = normalize(expr);
  const cleaned = cleanExpression(normalized);
  const result = safeEval(cleaned);
  return { line, ok: result.ok, value: result.ok ? result.value : null };
}

/* ---------- RENDER ---------- */

function render() {
  canvas.innerHTML = "";
  const lines = [];
  for (let i = 0; i < cm.lineCount(); i++) lines.push(cm.getLine(i));
  
  const blocks = parseBlocks(lines);
  let total = 0;

  blocks.forEach(b => {
    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");
    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";

    if (b.ok) {
      const num = b.value;
      el.textContent = num.toLocaleString('en-US', { maximumFractionDigits: 2 });
      if (num > 0) el.classList.add("positive");
      if (num < 0) el.classList.add("negative");
      total += num;
    } else {
      el.textContent = "—";
      el.style.opacity = 0.3;
    }
    canvas.appendChild(el);
  });

  if (Math.abs(total) < 0.005) total = 0;
  totalDiv.textContent = total.toLocaleString('en-US', { maximumFractionDigits: 2 });

  const scrollInfo = cm.getScrollInfo();
  canvas.style.transform = `translateY(-${scrollInfo.top}px)`;
}

/* ---------- INIT ---------- */
setTimeout(render, 50); 
</script>

</body>
</html>
