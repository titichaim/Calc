<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.cm-number {
  color: #4cd964 !important;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
  overflow: hidden; /* ทำหน้าที่เป็นกรอบหน้าต่างนิ่งๆ คอยบังส่วนที่ล้น */
}

.canvas {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  will-change: transform; /* ให้แผ่นด้านในเลื่อนขึ้นลงแทน */
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>

  <div class="right">
    <div id="canvas" class="canvas"></div>
  </div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
/* ---------- INIT ---------- */

CodeMirror.defineMode("calc", function() {
  return {
    token: function(stream) {
      if (stream.match(/^[0-9,]+(\.[0-9]+)?([kKmM]?)/)) {
        return "number"; 
      }
      stream.next();
      return null;
    }
  };
});

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "calc",
  lineWrapping: true,
  viewportMargin: Infinity // วาดทุกบรรทัด เพื่อให้รองรับข้อมูลได้ไม่จำกัดบรรทัด
});

cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

NOTE: ยอดนี้ยังไม่ต้องคิด 500 + 200 ;

UOB WORLD: 81 + 109 +
147 + 74 + 79 + 31 +
733.27 + 3500 + 50
`);

const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* ---------- SAVE ---------- */

cm.on("change", () => {
  localStorage.setItem("calc-data", cm.getValue());
  render();
});

/* ---------- SCROLL ---------- */

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  // แก้ไข: เลื่อนแผ่น canvas ด้านใน แทนการเลื่อนกรอบ .right 
  canvas.style.transform = `translateY(-${scroll.top}px)`;
});

/* ---------- ENGINE ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .replace(/[^0-9+\-*/().\s]/g, " ");
}

function cleanExpression(expr) {
  return expr
    .replace(/\s+/g, " ")
    .trim()
    .replace(/[+\-*/]+$/, "")
    .replace(/^\s*[*\/]+/, "");
}

function safeEval(expr) {
  try {
    if (!expr) return { ok: false };

    if (!/^[0-9+\-*/().\s]+$/.test(expr)) {
      return { ok: false };
    }

    const val = Function('"use strict";return (' + expr + ')')();

    if (typeof val !== "number" || isNaN(val) || !isFinite(val)) {
      return { ok: false };
    }

    return { ok: true, value: val };

  } catch {
    return { ok: false };
  }
}

/* ---------- PARSER ---------- */

function parseBlocks(lines) {
  const blocks = [];
  let currentExpr = "";
  let startLine = null;

  function pushCurrent() {
    const trimmedExpr = currentExpr.trim();
    if (trimmedExpr !== "") {
      // ตรวจสอบว่าถ้าข้อความ "ไม่ได้" ลงท้ายด้วยเครื่องหมาย ; ให้คำนวณตามปกติ
      if (!trimmedExpr.endsWith(";")) {
        blocks.push(buildBlock(startLine !== null ? startLine : 0, currentExpr));
      }
    }
    currentExpr = "";
    startLine = null;
  }

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i] || "";
    let line = raw.split("//")[0].trim();
    
    if (line === "") {
      pushCurrent();
      continue;
    }

    if (line.includes(":")) {
      pushCurrent();
      startLine = i;
      currentExpr = line.substring(line.indexOf(":") + 1).trim();
      continue;
    }

    let endsWithOp = /[+\-*/(]$/.test(currentExpr.trim());
    let startsWithOp = /^[+\-*/)]/.test(line);

    if (currentExpr === "") {
      startLine = i;
      currentExpr = line;
    } 
    else if (endsWithOp || startsWithOp) {
      currentExpr += " " + line;
    } 
    else {
      pushCurrent();
      startLine = i;
      currentExpr = line;
    }
  }

  pushCurrent();

  return blocks;
}

function buildBlock(line, expr) {
  const normalized = normalize(expr);
  const cleaned = cleanExpression(normalized);
  const result = safeEval(cleaned);

  return {
    line,
    ok: result.ok,
    value: result.ok ? result.value : null
  };
}

/* ---------- RENDER ---------- */

function render() {
  canvas.innerHTML = "";

  const lines = [];
  for (let i = 0; i < cm.lineCount(); i++) {
    lines.push(cm.getLine(i));
  }

  const blocks = parseBlocks(lines);

  let total = 0;

  blocks.forEach(b => {
    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");

    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";

    if (b.ok) {
      const num = b.value;
      el.textContent = num.toLocaleString('en-US', { maximumFractionDigits: 2 });

      if (num > 0) el.classList.add("positive");
      if (num < 0) el.classList.add("negative");

      total += num;
    } else {
      el.textContent = "—";
      el.style.opacity = 0.3;
    }

    canvas.appendChild(el);
  });

  totalDiv.textContent = total.toLocaleString('en-US', { maximumFractionDigits: 2 });

  // จัดตำแหน่ง canvas ให้ตรงกับ Scroll ทันทีหลังจากการคำนวณใหม่
  const scrollInfo = cm.getScrollInfo();
  canvas.style.transform = `translateY(-${scrollInfo.top}px)`;
}

/* ---------- INIT ---------- */
setTimeout(render, 50); 
</script>

</body>
</html>
