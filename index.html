<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Editor</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* EDITOR */
.editor {
  width: 50%;
  padding: 16px;
  outline: none;
  overflow-y: auto;
  white-space: pre-wrap;
  font-size: 16px;
  line-height: 28px;
}

/* COLORS */
.num { color: #4cd964; }
.op { color: #5ac8fa; }
.text { color: #ffffff; }

/* RIGHT */
.right {
  width: 50%;
  padding: 16px;
  border-left: 1px solid #222;
}

.row {
  height: 28px;
  display: flex;
  justify-content: flex-end;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">

  <div id="editor" class="editor" contenteditable="true"></div>

  <div class="right" id="results"></div>

</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script>
const editor = document.getElementById("editor");
const resultsDiv = document.getElementById("results");
const totalDiv = document.getElementById("total");

/* ---------- INIT ---------- */
editor.innerText = localStorage.getItem("calc-data") || 
`DEPT: -247,000
CC: -147,880.61
GIG: -10k

UOB: 100 + 50`;

updateAll();

/* ---------- EVENTS ---------- */
editor.addEventListener("input", () => {
  save();
  updateAll();
});

/* ---------- SAVE ---------- */
function save() {
  localStorage.setItem("calc-data", editor.innerText);
}

/* ---------- HIGHLIGHT ---------- */

function highlight(text) {
  return text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/(\d+(\.\d+)?)/g, '<span class="num">$1</span>')
    .replace(/([+\-*/])/g, '<span class="op">$1</span>')
    .replace(/([a-zA-Zก-ฮ:]+)/g, '<span class="text">$1</span>');
}

/* ---------- CARET ---------- */

function setCaretToEnd(el) {
  const range = document.createRange();
  const sel = window.getSelection();
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

/* ---------- RENDER ---------- */

function updateEditor() {
  const text = editor.innerText;
  const html = text.split("\n").map(line => highlight(line)).join("<br>");
  editor.innerHTML = html;
  setCaretToEnd(editor); // 👈 ง่ายแต่ยังไม่ perfect
}

/* ---------- CALC ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000);
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict";return (' + expr + ')')();
  } catch {
    return null;
  }
}

function calculate() {
  const lines = editor.innerText.split("\n");

  resultsDiv.innerHTML = "";
  let total = 0;

  lines.forEach(line => {
    const expr = normalize(line.split(":").pop());
    const val = safeEval(expr);

    const row = document.createElement("div");
    row.className = "row";

    if (val !== null && !isNaN(val)) {
      const num = Number(val);
      row.textContent = num.toLocaleString();

      if (num > 0) row.classList.add("positive");
      if (num < 0) row.classList.add("negative");

      total += num;
    }

    resultsDiv.appendChild(row);
  });

  totalDiv.textContent = total.toLocaleString();
}

/* ---------- RUN ---------- */

function updateAll() {
  updateEditor();
  calculate();
}
</script>

</body>
</html>
