<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
}

/* RIGHT LAYER */
.right {
  width: 50%;
  position: relative;
  overflow: hidden;
  will-change: transform;
}

.canvas {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
}

/* RESULT */
.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>

  <div class="right">
    <div id="canvas" class="canvas"></div>
  </div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
/* ---------- INIT ---------- */

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "text",
  lineWrapping: true
});

cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

UOB WORLD: 81 + 109 +
147 + 74 + 79 +
733.27 + 3500 + 50

UOB ONE: 45 + 22 + 47 +
45 - 63.50 + 145 + 272 -
16 + 47 + 16 + 33 + 50`);

const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* ---------- SAVE ---------- */

cm.on("change", () => {
  localStorage.setItem("calc-data", cm.getValue());
  render();
});

/* ---------- SCROLL SYNC ---------- */

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  document.querySelector(".right").style.transform =
    `translateY(-${scroll.top}px)`;
});

/* ---------- MATH ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000);
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict";return (' + expr + ')')();
  } catch {
    return null;
  }
}

/* ---------- PARSER (PRO) ---------- */

function parseBlocks(lines) {
  const blocks = [];
  let buffer = "";
  let startLine = null;

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i];
    let line = raw.split("//")[0];

    if (line.includes(":")) {
      // flush ก่อนหน้า
      if (buffer.trim()) {
        blocks.push({ line: startLine, expr: buffer });
      }

      startLine = i;
      buffer = line.split(":").slice(1).join(":");
      continue;
    }

    if (!buffer && line.trim()) {
      // line ไม่มี label แต่มี expression
      startLine = i;
    }

    buffer += " " + line;

    // ถ้าจบ expression
    if (!/[+\-*/]$/.test(line.trim())) {
      if (buffer.trim()) {
        blocks.push({ line: startLine, expr: buffer });
      }
      buffer = "";
      startLine = null;
    }
  }

  if (buffer.trim()) {
    blocks.push({ line: startLine, expr: buffer });
  }

  return blocks.map(b => ({
    line: b.line,
    value: safeEval(normalize(b.expr))
  }));
}

/* ---------- RENDER ENGINE ---------- */

function render() {
  const lineCount = cm.lineCount();
  const lines = [];

  for (let i = 0; i < lineCount; i++) {
    lines.push(cm.getLine(i) || "");
  }

  const blocks = parseBlocks(lines);

  canvas.innerHTML = "";
  let total = 0;

  blocks.forEach(b => {
    if (b.value === null || isNaN(b.value)) return;

    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");

    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";

    const num = Number(b.value);
    el.textContent = num.toLocaleString();

    if (num > 0) el.classList.add("positive");
    if (num < 0) el.classList.add("negative");

    canvas.appendChild(el);
    total += num;
  });

  totalDiv.textContent = total.toLocaleString();
}

/* ---------- INIT RUN ---------- */
render();
</script>

</body>
</html>
