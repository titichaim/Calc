<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
  overflow: hidden;
  will-change: transform;
}

.canvas {
  position: absolute;
  inset: 0;
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>

  <div class="right">
    <div id="canvas" class="canvas"></div>
  </div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
/* ---------- INIT ---------- */

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "text",
  lineWrapping: true
});

cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

UOB WORLD: 81 + 109 +
147 + 74 + 79 +
733.27 + 3500 + 50
`);

const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* ---------- SAVE ---------- */

cm.on("change", () => {
  localStorage.setItem("calc-data", cm.getValue());
  render();
});

/* ---------- SCROLL ---------- */

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  document.querySelector(".right").style.transform =
    `translateY(-${scroll.top}px)`;
});

/* ---------- ENGINE ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .replace(/[^0-9+\-*/().\s]/g, " ");
}

function cleanExpression(expr) {
  return expr
    .replace(/\s+/g, " ")
    .trim()
    .replace(/[+\-*/]+$/, "")
    .replace(/^\s*[+\-*/]+/, "");
}

function safeEval(expr) {
  try {
    if (!expr) return { ok: false };

    if (!/^[0-9+\-*/().\s]+$/.test(expr)) {
      return { ok: false };
    }

    const val = Function('"use strict";return (' + expr + ')')();

    if (typeof val !== "number" || isNaN(val)) {
      return { ok: false };
    }

    return { ok: true, value: val };

  } catch {
    return { ok: false };
  }
}

/* ---------- PARSER ---------- */

function parseBlocks(lines) {
  const blocks = [];
  let buffer = "";
  let startLine = null;

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i] || "";
    let line = raw.split("//")[0];

    if (line.includes(":")) {
      if (buffer.trim()) {
        blocks.push(buildBlock(startLine, buffer));
      }
      startLine = i;
      buffer = line.split(":").slice(1).join(":");
      continue;
    }

    if (!buffer && line.trim()) {
      startLine = i;
    }

    buffer += " " + line;

    if (!/[+\-*/]$/.test(line.trim())) {
      if (buffer.trim()) {
        blocks.push(buildBlock(startLine, buffer));
      }
      buffer = "";
      startLine = null;
    }
  }

  if (buffer.trim()) {
    blocks.push(buildBlock(startLine, buffer));
  }

  return blocks;
}

function buildBlock(line, expr) {
  const normalized = normalize(expr);
  const cleaned = cleanExpression(normalized);
  const result = safeEval(cleaned);

  return {
    line,
    ok: result.ok,
    value: result.ok ? result.value : null
  };
}

/* ---------- RENDER ---------- */

function render() {
  canvas.innerHTML = "";

  const lines = [];
  for (let i = 0; i < cm.lineCount(); i++) {
    lines.push(cm.getLine(i));
  }

  const blocks = parseBlocks(lines);

  let total = 0;

  blocks.forEach(b => {
    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");

    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";

    if (b.ok) {
      const num = b.value;
      el.textContent = num.toLocaleString();

      if (num > 0) el.classList.add("positive");
      if (num < 0) el.classList.add("negative");

      total += num;
    } else {
      el.textContent = "—";
      el.style.opacity = 0.3;
    }

    canvas.appendChild(el);
  });

  totalDiv.textContent = total.toLocaleString();
}

/* ---------- INIT ---------- */
render();
</script>

</body>
</html>
