<script>
function normalizeExpression(expr) {
  return expr
    .replace(/,/g, "") // remove comma
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .trim();
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict"; return (' + expr + ')')();
  } catch {
    return null;
  }
}

function parseLines(lines) {
  let results = [];
  let buffer = "";

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // เอา comment ออก
    line = line.split("//")[0];

    // เอา label ออก (ก่อน :)
    if (line.includes(":")) {
      line = line.split(":").slice(1).join(":");
    }

    line = normalizeExpression(line);

    if (!line.trim()) {
      results.push(null);
      continue;
    }

    buffer += " " + line;

    // ถ้าจบด้วย operator → ยังไม่คำนวณ
    if (/[+\-*/]$/.test(line)) {
      results.push(null);
      continue;
    }

    // คำนวณ
    const result = safeEval(buffer);

    results.push(result);
    buffer = "";
  }

  return results;
}
</script>
