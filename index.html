<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<!-- CodeMirror -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* editor */
.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
}

/* right */
.right {
  width: 50%;
  padding: 16px;
  border-left: 1px solid #222;
}

.row {
  height: 28px;
  display: flex;
  justify-content: flex-end;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* footer */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>
  <div class="right" id="results"></div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
/* ---------- INIT EDITOR ---------- */

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "text",
});

/* default data */
cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

UOB: 100 + 50`);

/* ---------- SAVE ---------- */
cm.on("change", () => {
  const value = cm.getValue();
  localStorage.setItem("calc-data", value);
  calculate();
});

/* ---------- CALC ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000);
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict";return (' + expr + ')')();
  } catch {
    return null;
  }
}

function calculate() {
  const lines = cm.getValue().split("\n");

  const resultsDiv = document.getElementById("results");
  const totalDiv = document.getElementById("total");

  resultsDiv.innerHTML = "";

  let total = 0;

  lines.forEach(line => {
    const expr = normalize(line.split(":").pop());
    const val = safeEval(expr);

    const row = document.createElement("div");
    row.className = "row";

    if (val !== null && !isNaN(val)) {
      const num = Number(val);
      row.textContent = num.toLocaleString();

      if (num > 0) row.classList.add("positive");
      if (num < 0) row.classList.add("negative");

      total += num;
    }

    resultsDiv.appendChild(row);
  });

  totalDiv.textContent = total.toLocaleString();
}

/* run first */
calculate();
</script>

</body>
</html>
