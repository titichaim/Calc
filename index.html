<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

.CodeMirror {
  width: 50%;
  height: 100%;
  background: #000;
  color: #fff;
  font-size: 16px;
  line-height: 1.6;
}

/* RIGHT */
.right {
  width: 50%;
  position: relative;
  overflow: hidden;
  will-change: transform;
}

.canvas {
  position: absolute;
  inset: 0;
}

.result {
  position: absolute;
  right: 16px;
  font-size: 16px;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; } /* สีแดงสำหรับค่าติดลบ */

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">
  <textarea id="editor"></textarea>

  <div class="right">
    <div id="canvas" class="canvas"></div>
  </div>
</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>

<script>
/* ---------- INIT ---------- */

const cm = CodeMirror.fromTextArea(document.getElementById("editor"), {
  lineNumbers: false,
  mode: "text",
  lineWrapping: true
});

cm.setValue(localStorage.getItem("calc-data") || 
`DEPT: -247000
CC: -147880.61
GIG: -10k

UOB WORLD: 81 + 109 +
147 + 74 + 79 + 31 +
733.27 + 3500 + 50
`);

const canvas = document.getElementById("canvas");
const totalDiv = document.getElementById("total");

/* ---------- SAVE ---------- */

cm.on("change", () => {
  localStorage.setItem("calc-data", cm.getValue());
  render();
});

/* ---------- SCROLL ---------- */

cm.on("scroll", () => {
  const scroll = cm.getScrollInfo();
  document.querySelector(".right").style.transform =
    `translateY(-${scroll.top}px)`;
});

/* ---------- ENGINE ---------- */

function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000)
    .replace(/(\d+(\.\d+)?)m/gi, (_, n) => n * 1000000)
    .replace(/[^0-9+\-*/().\s]/g, " ");
}

function cleanExpression(expr) {
  return expr
    .replace(/\s+/g, " ")
    .trim()
    .replace(/[+\-*/]+$/, "")
    // ไม่ตัดเครื่องหมาย + หรือ - ด้านหน้าสุดทิ้ง เพื่อรักษาค่าติดลบไว้
    .replace(/^\s*[*\/]+/, "");
}

function safeEval(expr) {
  try {
    if (!expr) return { ok: false };

    if (!/^[0-9+\-*/().\s]+$/.test(expr)) {
      return { ok: false };
    }

    const val = Function('"use strict";return (' + expr + ')')();

    // เช็คค่า Infinity กรณีหารด้วย 0 ด้วย isFinite
    if (typeof val !== "number" || isNaN(val) || !isFinite(val)) {
      return { ok: false };
    }

    return { ok: true, value: val };

  } catch {
    return { ok: false };
  }
}

/* ---------- PARSER ---------- */

function parseBlocks(lines) {
  const blocks = [];
  let currentExpr = "";
  let startLine = null;

  for (let i = 0; i < lines.length; i++) {
    let raw = lines[i] || "";
    let line = raw.split("//")[0].trim();
    
    if (line === "") continue; // ข้ามบรรทัดว่าง

    // 1. ถ้าเจอบรรทัดที่มีเครื่องหมาย : หมายถึงการบังคับขึ้นกลุ่มใหม่
    if (line.includes(":")) {
      if (currentExpr !== "") {
        blocks.push(buildBlock(startLine, currentExpr));
      }
      startLine = i;
      currentExpr = line.substring(line.indexOf(":") + 1).trim();
      continue;
    }

    // เช็คว่าบรรทัดก่อนหน้าลงท้ายด้วยเครื่องหมายคณิตศาสตร์หรือไม่
    let endsWithOp = /[+\-*/]$/.test(currentExpr.trim());
    // เช็คว่าบรรทัดใหม่นี้ ขึ้นต้นด้วยเครื่องหมายคณิตศาสตร์หรือไม่
    let startsWithOp = /^[+\-*/]/.test(line);

    if (currentExpr === "") {
      startLine = i;
      currentExpr = line;
    } 
    // 2. ถ้ามีการเชื่อมด้วยเครื่องหมาย (หน้าหรือหลัง) ให้นำสมการมาต่อกัน
    else if (endsWithOp || startsWithOp) {
      currentExpr += " " + line;
    } 
    // 3. ถ้าไม่มีเครื่องหมายเชื่อมเลย แสดงว่าต้องการขึ้นผลลัพธ์ก้อนใหม่
    else {
      blocks.push(buildBlock(startLine, currentExpr));
      startLine = i;
      currentExpr = line;
    }
  }

  // ปิดจบกลุ่มสุดท้ายที่ค้างอยู่ใน Buffer
  if (currentExpr !== "") {
    blocks.push(buildBlock(startLine, currentExpr));
  }

  return blocks;
}

function buildBlock(line, expr) {
  const normalized = normalize(expr);
  const cleaned = cleanExpression(normalized);
  const result = safeEval(cleaned);

  return {
    line,
    ok: result.ok,
    value: result.ok ? result.value : null
  };
}

/* ---------- RENDER ---------- */

function render() {
  canvas.innerHTML = "";

  const lines = [];
  for (let i = 0; i < cm.lineCount(); i++) {
    lines.push(cm.getLine(i));
  }

  const blocks = parseBlocks(lines);

  let total = 0;

  blocks.forEach(b => {
    const coord = cm.charCoords({ line: b.line, ch: 0 }, "local");

    const el = document.createElement("div");
    el.className = "result";
    el.style.top = coord.top + "px";

    if (b.ok) {
      const num = b.value;
      // จัดฟอร์แมตตัวเลขให้มีลูกน้ำ และมีทศนิยมสูงสุด 2 ตำแหน่ง
      el.textContent = num.toLocaleString('en-US', { maximumFractionDigits: 2 });

      if (num > 0) el.classList.add("positive");
      if (num < 0) el.classList.add("negative"); // ใส่คลาส .negative ให้ตัวหนังสือเป็นสีแดง

      total += num;
    } else {
      // หากบรรทัดไหนพิมพ์สมการผิด จะแสดงผลขีดกลางสีเทา เพื่อให้รู้ว่ามีข้อผิดพลาด
      el.textContent = "—";
      el.style.opacity = 0.3;
    }

    canvas.appendChild(el);
  });

  // อัปเดตยอดรวมด้านล่าง
  totalDiv.textContent = total.toLocaleString('en-US', { maximumFractionDigits: 2 });
}

/* ---------- INIT ---------- */
// เพิ่ม Delay เล็กน้อยตอนโหลดครั้งแรก เพื่อให้ CodeMirror คำนวณความสูงบรรทัดเสร็จก่อน
setTimeout(render, 50); 
</script>

</body>
</html>
