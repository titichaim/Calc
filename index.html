<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calc Stable</title>

<style>
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: #fff;
}

.container {
  display: flex;
  height: calc(100vh - 60px);
}

/* LEFT */
.editor {
  position: relative;
  width: 50%;
}

#highlight {
  position: absolute;
  inset: 0;
  padding: 16px;
  font-size: 16px;
  line-height: 28px;
  white-space: pre-wrap;
  pointer-events: none;
}

textarea {
  position: absolute;
  inset: 0;
  background: transparent;
  color: transparent;
  caret-color: #9fef00;
  border: none;
  outline: none;
  resize: none;
  padding: 16px;
  font-size: 16px;
  line-height: 28px;
}

/* COLORS */
.num { color: #4cd964; }
.op { color: #5ac8fa; }
.text { color: #ffffff; }

/* RIGHT */
.right {
  width: 50%;
  padding: 16px;
  border-left: 1px solid #222;
  overflow-y: auto;
}

.row {
  height: 28px;
  display: flex;
  justify-content: flex-end;
}

.positive { color: #4cd964; }
.negative { color: #ff3b30; }

/* FOOTER */
.footer {
  height: 60px;
  background: #111;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 16px;
}
</style>
</head>

<body>

<div class="container">

  <div class="editor">
    <pre id="highlight"></pre>
    <textarea id="input"></textarea>
  </div>

  <div class="right" id="results"></div>

</div>

<div class="footer">
  <div>Total</div>
  <div id="total">0</div>
</div>

<script>
const input = document.getElementById("input");
const highlight = document.getElementById("highlight");
const resultsDiv = document.getElementById("results");
const totalDiv = document.getElementById("total");

/* ---------- INIT ---------- */
input.value = localStorage.getItem("calc-data") || 
`DEPT: -247,000
CC: -147,880.61
GIG: -10k

UOB: 100 + 50`;

updateAll();

/* ---------- EVENTS ---------- */
input.addEventListener("input", () => {
  try {
    localStorage.setItem("calc-data", input.value);
    updateAll();
  } catch (e) {
    console.error("update error:", e);
  }
});

input.addEventListener("scroll", () => {
  highlight.scrollTop = input.scrollTop;
});

/* ---------- HIGHLIGHT (SAFE) ---------- */
function highlightText(text) {
  // escape ก่อน
  text = text
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");

  return text.replace(
    /(\d+(\.\d+)?)|([+\-*/])|([a-zA-Zก-ฮ:]+)/g,
    (match) => {
      if (/^\d/.test(match)) return `<span class="num">${match}</span>`;
      if (/^[+\-*/]$/.test(match)) return `<span class="op">${match}</span>`;
      return `<span class="text">${match}</span>`;
    }
  );
}

function updateHighlight() {
  try {
    highlight.innerHTML = highlightText(input.value);
  } catch (e) {
    console.error("highlight error:", e);
    highlight.innerText = input.value; // fallback กันพัง
  }
}

/* ---------- CALC ---------- */
function normalize(expr) {
  return expr
    .replace(/,/g, "")
    .replace(/(\d+(\.\d+)?)k/gi, (_, n) => n * 1000);
}

function safeEval(expr) {
  try {
    if (!/^[0-9+\-*/().\s]+$/.test(expr)) return null;
    return Function('"use strict";return (' + expr + ')')();
  } catch {
    return null;
  }
}

function calculate() {
  const lines = input.value.split("\n");

  resultsDiv.innerHTML = "";
  let total = 0;

  lines.forEach(line => {
    const expr = normalize(line.split(":").pop());
    const val = safeEval(expr);

    const row = document.createElement("div");
    row.className = "row";

    if (val !== null && !isNaN(val)) {
      const num = Number(val);
      row.textContent = num.toLocaleString();

      if (num > 0) row.classList.add("positive");
      if (num < 0) row.classList.add("negative");

      total += num;
    }

    resultsDiv.appendChild(row);
  });

  totalDiv.textContent = total.toLocaleString();
}

/* ---------- RUN ---------- */
function updateAll() {
  updateHighlight();
  calculate();
}
</script>

</body>
</html>
